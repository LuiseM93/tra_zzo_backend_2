name: Lead Nurture Cron
on:
  schedule:
    - cron: '0 14 * * *'
jobs:
  nurture:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger lead nurture
        env:
          CRON_SECRET: ${CRON_SECRET}
        run: curl -H "Authorization: Bearer $CRON_SECRET" https://trazzoapp.online/api/cron/lead-nurture
